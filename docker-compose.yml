services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing_arya_app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env:ro
      - storage_public:/var/www/storage/app/public
      - storage_logs:/var/www/storage/logs
      - public_build:/var/www/public/build
    networks:
      - ticketing_net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: ticketing_arya_nginx
    restart: unless-stopped
    # Tidak expose port ke host — traffic masuk via ich-pendidikan-nginx-1
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - public_build:/var/www/public/build:ro
      - storage_public:/var/www/storage/app/public:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - ticketing_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ticketing_arya_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ticketing_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  certbot:
    image: certbot/certbot:latest
    container_name: ticketing_arya_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  storage_public:
  storage_logs:
  certbot_www:
  certbot_conf:
  public_build:

networks:
  ticketing_net:
    driver: bridge
