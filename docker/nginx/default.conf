# Nginx internal ticketing-arya — tidak expose port ke host.
# Traffic masuk via reverse proxy ich-pendidikan-nginx-1 (port 80/443 host).
server {
    listen 80;
    server_name ticketing-arya.web.id;
    root /var/www/public;
    index index.php;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Laravel: serve file storage (poster event) dari volume
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Sembunyikan file sensitif
    location ~* \.(env|log|lock|sql)$ {
        deny all;
    }

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
